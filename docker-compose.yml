services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mm_user
      POSTGRES_PASSWORD: mm_password
      POSTGRES_DB: mm_ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm_user -d mm_ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  umami-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami_password
      POSTGRES_DB: umami
    volumes:
      - umami_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami_password@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: change-me-in-production-to-a-random-secret
    depends_on:
      umami-db:
        condition: service_healthy

volumes:
  postgres_data:
  umami_data:
