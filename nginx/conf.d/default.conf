# ── HTTP: redirect all to HTTPS + certbot challenge ────────────────────────────
server {
    listen 80;
    server_name meltingmomentscakes.com www.meltingmomentscakes.com
                admin.meltingmomentscakes.com
                api.meltingmomentscakes.com
                analytics.meltingmomentscakes.com;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Web storefront ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name meltingmomentscakes.com www.meltingmomentscakes.com;

    ssl_certificate     /etc/letsencrypt/live/meltingmomentscakes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meltingmomentscakes.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    limit_req zone=web_limit burst=50 nodelay;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public images — medium cache
    location /images/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://web:3000;
    }
}

# ── Admin panel ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name admin.meltingmomentscakes.com;

    ssl_certificate     /etc/letsencrypt/live/admin.meltingmomentscakes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.meltingmomentscakes.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options           "DENY"                 always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    limit_req zone=web_limit burst=30 nodelay;

    location /_next/static/ {
        proxy_pass http://admin:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://admin:3001;
    }
}

# ── API ────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.meltingmomentscakes.com;

    ssl_certificate     /etc/letsencrypt/live/api.meltingmomentscakes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.meltingmomentscakes.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-Frame-Options           "DENY"                 always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Stricter rate limit for API
    limit_req zone=api_limit burst=20 nodelay;

    # Increase body size for file uploads
    client_max_body_size 10M;

    location / {
        proxy_pass http://api:8000;
        proxy_read_timeout 120s;
    }
}

# ── Analytics (Umami) ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name analytics.meltingmomentscakes.com;

    ssl_certificate     /etc/letsencrypt/live/analytics.meltingmomentscakes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.meltingmomentscakes.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    limit_req zone=web_limit burst=30 nodelay;

    location / {
        proxy_pass http://umami:3000;
    }
}
