# HTTP-only config — used when USE_SSL=false (no domain / pre-SSL setup)
server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Certbot webroot challenge (harmless to include even without SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://api:8000;
        proxy_read_timeout 120s;
    }
}
