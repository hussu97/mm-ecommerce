# HTTP-only config — used when USE_SSL=false (no domain / pre-SSL setup)
server {
    listen 80;
    server_name aggregator-api.meltingmomentscakes.com;

    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $aggregator_api http://aggregator-api:8000;

    location / {
        proxy_pass $aggregator_api;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Certbot webroot challenge (harmless to include even without SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://api:8000;
        proxy_read_timeout 120s;
    }
}
