# ── HTTP: redirect to HTTPS + certbot challenge (api only) ───────────────────
# Note: meltingmomentscakes.com, admin.meltingmomentscakes.com, and
# aggregator.meltingmomentscakes.com are on Vercel. This VM only serves API hosts.
server {
    listen 80;
    server_name api.meltingmomentscakes.com aggregator-api.meltingmomentscakes.com;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Aggregator API ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name aggregator-api.meltingmomentscakes.com;

    ssl_certificate     /etc/letsencrypt/live/aggregator-api.meltingmomentscakes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aggregator-api.meltingmomentscakes.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    limit_req zone=api_limit burst=20 nodelay;
    client_max_body_size 50M;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $aggregator_api http://aggregator-api:8000;

    location / {
        proxy_pass $aggregator_api;
        proxy_read_timeout 300s;
    }
}

# ── API ────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.meltingmomentscakes.com;

    ssl_certificate     /etc/letsencrypt/live/api.meltingmomentscakes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.meltingmomentscakes.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-Frame-Options           "DENY"                 always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Stricter rate limit for API
    limit_req zone=api_limit burst=20 nodelay;

    # Increase body size for file uploads
    client_max_body_size 10M;

    location / {
        proxy_pass http://api:8000;
        proxy_read_timeout 120s;
    }
}
