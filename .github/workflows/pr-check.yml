name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  js-checks:
    name: Lint, Type-check & Build (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm --filter web exec tsc --noEmit && pnpm --filter admin exec tsc --noEmit

      - name: Build web
        run: pnpm --filter web build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build admin
        run: pnpm --filter admin build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  python-checks:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check apps/api/

      - name: Ruff format check
        run: ruff format --check apps/api/
