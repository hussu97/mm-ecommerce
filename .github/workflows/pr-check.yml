name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            api:
              - 'apps/api/**'
              - 'docker-compose*.yml'

  lint-web:
    name: Lint, Test & Build (Web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**/*.ts', 'apps/web/src/**/*.tsx', 'apps/web/**/*.ts', 'apps/web/**/*.tsx') }}
          restore-keys: |
            nextjs-web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-web-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web lint

      - name: Test
        run: pnpm --filter web test

      - name: Type-check
        run: pnpm --filter web exec tsc --noEmit

      - name: Build
        run: pnpm --filter web build

  lint-admin:
    name: Lint, Test & Build (Admin)
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/admin/.next/cache
          key: nextjs-admin-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/admin/src/**/*.ts', 'apps/admin/src/**/*.tsx', 'apps/admin/**/*.ts', 'apps/admin/**/*.tsx') }}
          restore-keys: |
            nextjs-admin-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-admin-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter admin lint

      - name: Test
        run: pnpm --filter admin test

      - name: Type-check
        run: pnpm --filter admin exec tsc --noEmit

      - name: Build
        run: pnpm --filter admin build

  lint-python:
    name: Lint & Test (Python)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Cache ruff
        uses: actions/cache@v4
        with:
          path: ~/.cache/ruff
          key: ruff-${{ runner.os }}-${{ hashFiles('apps/api/pyproject.toml') }}

      - name: Cache pytest
        uses: actions/cache@v4
        with:
          path: apps/api/.pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('apps/api/pyproject.toml') }}
          restore-keys: pytest-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"

      - name: Ruff check
        run: |
          cd apps/api
          ruff check .
        env:
          RUFF_CACHE_DIR: ~/.cache/ruff

      - name: Ruff format check
        run: |
          cd apps/api
          ruff format --check .
        env:
          RUFF_CACHE_DIR: ~/.cache/ruff

      - name: Run pytest
        run: |
          cd apps/api
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
