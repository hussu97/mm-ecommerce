name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: 'Git SHA to roll back to (defaults to HEAD~1 — previous commit)'
        required: false
        default: 'HEAD~1'
      run_migration_downgrade:
        description: 'Run alembic downgrade -1 before rolling back? (true/false)'
        required: false
        default: 'false'

jobs:
  rollback:
    name: Rollback via SSH
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Rollback on GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd /opt/mm-ecommerce

            echo "Current HEAD: $(git rev-parse HEAD)"
            echo "Rolling back to: ${{ inputs.git_sha }}"

            # Resolve the SHA in case HEAD~1 or similar expression was given
            TARGET_SHA=$(git rev-parse "${{ inputs.git_sha }}")
            echo "Resolved SHA: $TARGET_SHA"

            if [ "${{ inputs.run_migration_downgrade }}" = "true" ]; then
              echo "Running alembic downgrade -1..."
              docker compose -f docker-compose.prod.yml exec -T api \
                sh -c "alembic downgrade -1"
            fi

            echo "Checking out $TARGET_SHA..."
            git checkout "$TARGET_SHA"

            echo "Rebuilding and restarting services..."
            docker compose -f docker-compose.prod.yml up --build -d

            echo "Waiting for API to be healthy..."
            sleep 10
            docker compose -f docker-compose.prod.yml exec -T api \
              sh -c "alembic upgrade head"

            echo "Rollback complete. Running at: $(git rev-parse HEAD)"
