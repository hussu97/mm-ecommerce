name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: 'Git SHA to roll back to (defaults to HEAD~1 — previous commit)'
        required: false
        default: 'HEAD~1'
      run_migration_downgrade:
        description: 'Run alembic downgrade -1 before rolling back? (true/false)'
        required: false
        default: 'false'

jobs:
  rollback:
    name: Rollback via SSH
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read  # read GHCR to verify the image tag exists

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to resolve HEAD~1 etc.

      - name: Resolve target SHA
        id: resolve
        run: |
          TARGET_SHA=$(git rev-parse "${{ inputs.git_sha }}")
          echo "sha=${TARGET_SHA}" >> $GITHUB_OUTPUT
          echo "Resolved '${{ inputs.git_sha }}' → ${TARGET_SHA}"

      - name: Log in to GHCR (to inspect private package)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists in GHCR
        run: |
          docker manifest inspect \
            ghcr.io/hussu97/mm-ecommerce-api:${{ steps.resolve.outputs.sha }} || {
            echo "ERROR: No image found for SHA ${{ steps.resolve.outputs.sha }}."
            echo "Only commits that went through the deploy pipeline have a GHCR image."
            exit 1
          }

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write .env on VM
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cat > /opt/melting-moments-cakes/.env" <<'ENVEOF'
          APP_ENV=${{ secrets.APP_ENV }}
          USE_SSL=${{ secrets.USE_SSL }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          REFRESH_TOKEN_EXPIRE_DAYS=${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}
          PASSWORD_RESET_EXPIRE_MINUTES=${{ secrets.PASSWORD_RESET_EXPIRE_MINUTES }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL=${{ secrets.FROM_EMAIL }}
          CLOUDFLARE_R2_ACCESS_KEY=${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_KEY=${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
          CLOUDFLARE_R2_BUCKET=${{ secrets.CLOUDFLARE_R2_BUCKET }}
          CLOUDFLARE_R2_ENDPOINT=${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          CLOUDFLARE_R2_PUBLIC_URL=${{ secrets.CLOUDFLARE_R2_PUBLIC_URL }}
          TABBY_API_KEY=${{ secrets.TABBY_API_KEY }}
          TABBY_PUBLIC_KEY=${{ secrets.TABBY_PUBLIC_KEY }}
          TABBY_MERCHANT_CODE=${{ secrets.TABBY_MERCHANT_CODE }}
          TAMARA_API_KEY=${{ secrets.TAMARA_API_KEY }}
          TAMARA_API_URL=${{ secrets.TAMARA_API_URL }}
          WEB_URL=${{ secrets.WEB_URL }}
          ADMIN_URL=${{ secrets.ADMIN_URL }}
          BACKUP_GCS_BUCKET=${{ secrets.BACKUP_GCS_BUCKET }}
          UMAMI_API_KEY=${{ secrets.UMAMI_API_KEY }}
          UMAMI_WEBSITE_ID=${{ secrets.UMAMI_WEBSITE_ID }}
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT=production
          ENVEOF

      - name: Rollback on GCP VM
        # ${{ }} expressions are expanded by GH Actions before the shell sees the heredoc,
        # so they work correctly even inside a single-quoted <<'SCRIPT' delimiter.
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' <<'SCRIPT'
          set -e

          TARGET_SHA="${{ steps.resolve.outputs.sha }}"
          cd /opt/melting-moments-cakes

          echo "Rolling back to SHA: $TARGET_SHA"

          if [ "${{ inputs.run_migration_downgrade }}" = "true" ]; then
            echo "Running alembic downgrade -1..."
            docker compose -f docker-compose.prod.yml exec -T api alembic downgrade -1
          fi

          echo "Checking out $TARGET_SHA (for compose files, nginx, etc.)..."
          git fetch origin
          git checkout "$TARGET_SHA"

          echo "Pulling pre-built image for $TARGET_SHA from GHCR..."
          docker pull ghcr.io/hussu97/mm-ecommerce-api:"$TARGET_SHA"

          echo "Tagging as :latest for compose..."
          docker tag ghcr.io/hussu97/mm-ecommerce-api:"$TARGET_SHA" \
                     ghcr.io/hussu97/mm-ecommerce-api:latest

          echo "Restarting API with rolled-back image..."
          docker compose -f docker-compose.prod.yml up -d --no-deps api

          echo "Waiting for API to be healthy..."
          API_READY=false
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T api curl -sf http://localhost:8000/ping > /dev/null 2>&1; then
              echo "API is up."
              API_READY=true
              break
            fi
            echo "  waiting... ($i/30)"
            sleep 5
          done

          if [ "$API_READY" != "true" ]; then
            echo "ERROR: API failed to start after rollback. Container logs:"
            docker compose -f docker-compose.prod.yml logs --tail=50 api
            exit 1
          fi

          echo "Running migrations for rolled-back version..."
          docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head

          echo "Ensuring nginx is up..."
          docker compose -f docker-compose.prod.yml up -d --no-deps nginx

          echo "Rollback complete. Running: $TARGET_SHA"
          docker compose -f docker-compose.prod.yml ps
          SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
