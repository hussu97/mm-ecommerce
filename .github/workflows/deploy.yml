name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e

            cd /opt/melting-moments-cakes

            echo "Pulling latest code..."
            git pull origin main

            echo "Building new API image (old container keeps running)..."
            docker compose -f docker-compose.prod.yml build api

            echo "Restarting services with new image..."
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for API to be healthy..."
            for i in $(seq 1 30); do
              docker compose -f docker-compose.prod.yml exec -T api sh -c "alembic upgrade head" && break
              echo "  API not ready yet, retrying in 3s... ($i/30)"
              sleep 3
            done

            echo "Pruning old images..."
            docker image prune -f

            echo "Deployment complete."
