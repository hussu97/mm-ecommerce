name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  changes:
    name: Detect -changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - '.github/workflows/deploy.yml'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - '.github/workflows/deploy.yml'
            api:
              - 'apps/api/**'
              - 'docker-compose*.yml'
              - '.github/workflows/deploy.yml'

  # ── Lint / test (no build — vercel build handles that in the deploy job) ────

  lint-web:
    name: Lint & Test (Web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web lint

      - name: Test
        run: pnpm --filter web test

      - name: Type-check
        run: pnpm --filter web exec tsc --noEmit

  lint-admin:
    name: Lint & Test (Admin)
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter admin lint

      - name: Test
        run: pnpm --filter admin test

      - name: Type-check
        run: pnpm --filter admin exec tsc --noEmit

  lint-python:
    name: Lint & Test (Python)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Cache ruff
        uses: actions/cache@v4
        with:
          path: ~/.cache/ruff
          key: ruff-${{ runner.os }}-${{ hashFiles('apps/api/pyproject.toml') }}

      - name: Cache pytest
        uses: actions/cache@v4
        with:
          path: apps/api/.pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('apps/api/pyproject.toml') }}
          restore-keys: pytest-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"

      - name: Ruff check
        run: |
          cd apps/api
          ruff check .
        env:
          RUFF_CACHE_DIR: ~/.cache/ruff

      - name: Ruff format check
        run: |
          cd apps/api
          ruff format --check .
        env:
          RUFF_CACHE_DIR: ~/.cache/ruff

      - name: Run pytest
        run: |
          cd apps/api
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  # ── Deploy ───────────────────────────────────────────────────────────────────

  deploy-web:
    name: Deploy Web to Vercel
    needs: [changes, lint-web]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**/*.ts', 'apps/web/src/**/*.tsx', 'apps/web/**/*.ts', 'apps/web/**/*.tsx') }}
          restore-keys: |
            nextjs-web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-web-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-admin:
    name: Deploy Admin to Vercel
    needs: [changes, lint-admin]
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/admin/.next/cache
          key: nextjs-admin-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/admin/src/**/*.ts', 'apps/admin/src/**/*.tsx', 'apps/admin/**/*.ts', 'apps/admin/**/*.tsx') }}
          restore-keys: |
            nextjs-admin-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-admin-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-gcp:
    name: Deploy API to GCP
    needs: [changes, lint-python]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write  # push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build on the fast GH Actions runner (4 vCPU, SSD) instead of the e2-micro.
      # GHA layer cache keeps subsequent builds fast (pip install hits cache).
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/mm-ecommerce-api:latest
            ghcr.io/${{ github.repository_owner }}/mm-ecommerce-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write .env on VM
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cat > /opt/melting-moments-cakes/.env" <<'ENVEOF'
          APP_ENV=${{ secrets.APP_ENV }}
          USE_SSL=${{ secrets.USE_SSL }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          REFRESH_TOKEN_EXPIRE_DAYS=${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}
          PASSWORD_RESET_EXPIRE_MINUTES=${{ secrets.PASSWORD_RESET_EXPIRE_MINUTES }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL=${{ secrets.FROM_EMAIL }}
          CLOUDFLARE_R2_ACCESS_KEY=${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_KEY=${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
          CLOUDFLARE_R2_BUCKET=${{ secrets.CLOUDFLARE_R2_BUCKET }}
          CLOUDFLARE_R2_ENDPOINT=${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          CLOUDFLARE_R2_PUBLIC_URL=${{ secrets.CLOUDFLARE_R2_PUBLIC_URL }}
          TABBY_API_KEY=${{ secrets.TABBY_API_KEY }}
          TABBY_PUBLIC_KEY=${{ secrets.TABBY_PUBLIC_KEY }}
          TABBY_MERCHANT_CODE=${{ secrets.TABBY_MERCHANT_CODE }}
          TAMARA_API_KEY=${{ secrets.TAMARA_API_KEY }}
          TAMARA_API_URL=${{ secrets.TAMARA_API_URL }}
          WEB_URL=${{ secrets.WEB_URL }}
          ADMIN_URL=${{ secrets.ADMIN_URL }}
          BACKUP_GCS_BUCKET=${{ secrets.BACKUP_GCS_BUCKET }}
          UMAMI_API_KEY=${{ secrets.UMAMI_API_KEY }}
          UMAMI_WEBSITE_ID=${{ secrets.UMAMI_WEBSITE_ID }}
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT=production
          ENVEOF

      - name: Deploy to GCP VM
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' <<'SCRIPT'
          set -e

          cd /opt/melting-moments-cakes

          echo "Pulling latest code (compose files, nginx config, etc.)..."
          git pull origin main

          echo "Pulling pre-built API image from GHCR..."
          docker pull ghcr.io/hussu97/mm-ecommerce-api:latest

          echo "Restarting API with new image..."
          docker compose -f docker-compose.prod.yml up -d --no-deps api

          echo "Waiting for API to be healthy..."
          API_READY=false
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T api curl -sf -H "Host: api.meltingmomentscakes.com" http://localhost:8000/ping > /dev/null 2>&1; then
              echo "API is up."
              API_READY=true
              break
            fi
            echo "  waiting... (${i}/30)"
            sleep 5
          done

          if [ "$API_READY" != "true" ]; then
            echo "ERROR: API failed to start. Container logs:"
            docker compose -f docker-compose.prod.yml logs --tail=50 api
            exit 1
          fi

          echo "Running database migrations..."
          docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head

          echo "Ensuring nginx is up..."
          docker compose -f docker-compose.prod.yml up -d --no-deps nginx

          echo "Pruning old images..."
          docker image prune -f

          echo "Deployment complete."
          docker compose -f docker-compose.prod.yml ps
          SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
