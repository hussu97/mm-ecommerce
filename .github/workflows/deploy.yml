name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            api:
              - 'apps/api/**'
              - 'docker-compose*.yml'

  lint-web:
    name: Lint, Type-check & Build (Web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web lint

      - name: Run tests
        run: pnpm --filter web test

      - name: Type-check
        run: pnpm --filter web exec tsc --noEmit

      - name: Build
        run: pnpm --filter web build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  lint-admin:
    name: Lint, Type-check & Build (Admin)
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter admin lint

      - name: Run tests
        run: pnpm --filter admin test

      - name: Type-check
        run: pnpm --filter admin exec tsc --noEmit

      - name: Build
        run: pnpm --filter admin build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  lint-python:
    name: Lint & Test (Python)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"
          pip install ruff

      - name: Ruff check
        run: ruff check apps/api/

      - name: Ruff format check
        run: ruff format --check apps/api/

      - name: Run pytest
        run: |
          cd apps/api
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  deploy-web:
    name: Deploy Web to Vercel
    needs: [changes, lint-web]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

  deploy-admin:
    name: Deploy Admin to Vercel
    needs: [changes, lint-admin]
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}

  deploy-gcp:
    name: Deploy API to GCP
    needs: [changes, lint-python]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 45m
          script: |
            set -e

            cd /opt/melting-moments-cakes

            echo "Pulling latest code..."
            git pull origin main

            echo "Building new API image (old container keeps running)..."
            docker compose -f docker-compose.prod.yml build api

            echo "Restarting services with new image..."
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for API to be healthy..."
            for i in $(seq 1 30); do
              docker compose -f docker-compose.prod.yml exec -T api sh -c "alembic upgrade head" && break
              echo "  API not ready yet, retrying in 3s... ($i/30)"
              sleep 3
            done

            echo "Pruning old images..."
            docker image prune -f

            echo "Deployment complete."
